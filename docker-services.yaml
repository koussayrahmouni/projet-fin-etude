# Kubernetes Services + Endpoints for Docker containers
# These allow Traefik (k3s ingress) to route traffic to Docker services running on the host
# The Endpoints point to the node IP (10.7.157.105) where Docker containers expose their ports

---
# Jenkins Service (port 8089)
apiVersion: v1
kind: Service
metadata:
  name: jenkins-docker
  namespace: default
spec:
  ports:
    - port: 8089
      targetPort: 8089
---
apiVersion: v1
kind: Endpoints
metadata:
  name: jenkins-docker
  namespace: default
subsets:
  - addresses:
      - ip: 10.7.157.105
    ports:
      - port: 8089

