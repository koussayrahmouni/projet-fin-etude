---
- name: "Section 1 - Verify JIRA Setup"
  hosts: local
  gather_facts: true
  vars:
    client_name: "{{ client_name | default('') }}"
  vars_files:
    - ../group_vars/all.yml

  tasks:
    - name: Ensure verification script is present and executable
      file:
        path: "{{ playbook_dir }}/../scripts/verify_jira.py"
        mode: '0755'
        state: file

    - name: Run JIRA verification script
      command: >-
        {{ playbook_dir }}/../scripts/verify_jira.py --client "{{ client_name }}"
      environment:
        JIRA_URL: "{{ jira_url }}"
        JIRA_USER: "{{ jira_user | default('') }}"
        JIRA_API_TOKEN: "{{ jira_api_token | default('') }}"
        SERVICE_DESK_PROJECT_KEY: "{{ service_desk_project_key | default('SD') }}"
        DEFAULT_TRANSITIONS: "{{ default_transition_names | join(',') }}"
      register: verify_run
      changed_when: false
      failed_when: false

    - name: Parse verification JSON output
      set_fact:
        section_result: "{{ verify_run.stdout | from_json }}"
      when: verify_run.stdout | length > 0

    - name: Set empty result on failure
      set_fact:
        section_result:
          section: 1
          name: "JIRA"
          client: "{{ client_name }}"
          timestamp: "{{ ansible_date_time.iso8601 }}"
          items:
            - id: "1.1"
              name: "Projet JIRA RUN à ouvrir"
              status: "not_started"
              detail: "Script failed: {{ verify_run.stderr | default('unknown error') | truncate(200) }}"
            - id: "1.2"
              name: "Création du composant JIRA"
              status: "not_started"
              detail: "Script failed"
            - id: "1.3"
              name: "Informer le service desk"
              status: "not_started"
              detail: "Script failed"
            - id: "1.4"
              name: "Clôturer tickets Build (DELIVERY)"
              status: "not_started"
              detail: "Script failed"
            - id: "1.5"
              name: "Clôturer tickets Build (ARCHITECTURE)"
              status: "not_started"
              detail: "Script failed"
      when: verify_run.stdout | length == 0

    - name: Output JSON result
      debug:
        msg: "{{ section_result | to_json }}"
