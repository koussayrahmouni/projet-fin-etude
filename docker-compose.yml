services:
  postgres:
    image: postgres:16
    container_name: excel_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: excel_user
      POSTGRES_PASSWORD: excel_password
      POSTGRES_DB: excel_editor
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  adminer:
    image: adminer
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: pepa-linha

  # ==================== YOUR NEXT.JS DASHBOARD ====================
  nextjs-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nextjs-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - postgres
    networks:
      - monitoring-internal

volumes:
  postgres_data:

networks:
  monitoring-internal:
    driver: bridge
    external: true