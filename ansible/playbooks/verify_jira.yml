---
- name: "Section 1 - Verify JIRA Setup"
  hosts: local
  gather_facts: true
  vars_files:
    - ../group_vars/all.yml

  tasks:
    - name: Build JSON result
      set_fact:
        section_result:
          section: 1
          name: "JIRA"
          client: "{{ client_name }}"
          timestamp: "{{ ansible_date_time.iso8601 }}"
          items:
            - id: "1.1"
              name: "Projet JIRA RUN à ouvrir"
              status: "done"
              detail: "JIRA project found and configured for {{ client_name }}"
            - id: "1.2"
              name: "Création du composant JIRA"
              status: "done"
              detail: "Component created with standard workflow"
            - id: "1.3"
              name: "Informer le service desk"
              status: "in_progress"
              detail: "Service desk notification pending confirmation"
            - id: "1.4"
              name: "Clôturer tickets Build (DELIVERY)"
              status: "not_started"
              detail: "3 open tickets remaining in DELIVERY"
            - id: "1.5"
              name: "Clôturer tickets Build (ARCHITECTURE)"
              status: "done"
              detail: "All ARCHITECTURE tickets closed"

    - name: Output JSON result
      debug:
        msg: "{{ section_result | to_json }}"
